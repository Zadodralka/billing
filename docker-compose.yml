
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpnbot}
      POSTGRES_USER: ${POSTGRES_USER:-vpnbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Задайте POSTGRES_PASSWORD в .env (тот же пароль должен быть в DATABASE_URL)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    build: .
    restart: unless-stopped
    # --proxy-headers + --forwarded-allow-ips: без этого uvicorn логирует и видит в
    # request.client адрес докер-моста (сюда стучится nginx), а не реального
    # посетителя, даже если nginx уже шлёт X-Forwarded-For/X-Real-IP. "*" безопасен
    # только потому, что порт 8000 ниже привязан к 127.0.0.1 - снаружи до контейнера
    # напрямую не достучаться, входит исключительно через nginx на этом же хосте.
    command: uvicorn web.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips="*"
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10m
      timeout: 5s
      retries: 3
      start_period: 15s

  bot:
    build: .
    restart: unless-stopped
    command: python -m bot.main
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,sys,time; sys.exit(0 if time.time() - os.path.getmtime('/tmp/bot_heartbeat') < 90 else 1)"]
      interval: 10m
      timeout: 5s
      retries: 3
      start_period: 20s

  # Планировщик (проверка истёкших подписок)
  scheduler:
    build: .
    restart: unless-stopped
    command: python scheduler.py
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,sys,time; sys.exit(0 if time.time() - os.path.getmtime('/tmp/scheduler_heartbeat') < 90 else 1)"]
      interval: 10m
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
