<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}VPN Кабинет{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --sidebar-bg: #0f172a;
            --sidebar-text: #94a3b8;
            --sidebar-active: #2563eb;
        }
        body { background: #f8fafc; min-height: 100vh; }
        .sidebar {
            width: 240px; min-height: 100vh; background: var(--sidebar-bg);
            position: fixed; top: 0; left: 0; z-index: 100; padding-top: 1rem;
        }
        .sidebar .brand {
            padding: 1rem 1.5rem 2rem;
            font-size: 1.25rem; font-weight: 700; color: #fff;
        }
        .sidebar .nav-link {
            color: var(--sidebar-text); padding: .6rem 1.5rem;
            border-radius: 0; display: flex; align-items: center; gap: .6rem;
            transition: all .15s;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff; background: rgba(37,99,235,.2);
            border-right: 3px solid var(--primary);
        }
        .main-content { margin-left: 240px; padding: 2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .badge-active { background: #dcfce7; color: #166534; }
        .badge-expired { background: #fee2e2; color: #991b1b; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 1rem; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}
<div class="sidebar">
    <div class="brand">🔒 VPN Panel</div>
    <nav class="nav flex-column">
        <a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}">
            <i class="bi bi-house"></i> Кабинет
        </a>
        <a href="/dashboard#plans" class="nav-link">
            <i class="bi bi-credit-card"></i> Купить подписку
        </a>
        {% if user and user.is_admin %}
        <hr class="border-secondary mx-3 my-2">
        <small class="text-secondary px-3 py-1" style="font-size:.7rem;text-transform:uppercase;">Админ</small>
        <a href="/admin" class="nav-link {% if '/admin' in request.url.path %}active{% endif %}">
            <i class="bi bi-speedometer2"></i> Дашборд
        </a>
        <a href="/admin/users" class="nav-link">
            <i class="bi bi-people"></i> Пользователи
        </a>
        <a href="/admin/subscriptions" class="nav-link">
            <i class="bi bi-list-check"></i> Подписки
        </a>
        {% endif %}
        <hr class="border-secondary mx-3 my-2">
        <a href="/auth/logout" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> Выйти
        </a>
    </nav>
</div>
<div class="main-content">
    {% block content %}{% endblock %}
</div>
{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
