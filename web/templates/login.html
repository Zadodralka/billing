<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Вход — Unlock VPN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14; --panel: #12161f; --panel-2: #161b26;
            --border: #232a38; --text: #e2e8f0; --muted: #6b7689; --accent: #3ddc84;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background-image: linear-gradient(rgba(61,220,132,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(61,220,132,.04) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black, transparent);
        }
        .card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
            padding: 2.4rem 2.2rem; width: 100%; max-width: 400px; position: relative; z-index: 1;
            box-shadow: 0 30px 60px rgba(0,0,0,.45);
        }
        .logo {
            width: 56px; height: 56px; border-radius: 16px; overflow: hidden;
            margin: 0 auto 1.1rem; box-shadow: 0 0 0 1px var(--border);
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; color: #fff; text-align: center; margin: 0 0 .3rem; }
        .subtitle { text-align: center; color: var(--muted); font-size: .87rem; margin-bottom: 1.8rem; }
        .alert { padding: .75rem .9rem; border-radius: 10px; font-size: .85rem; margin-bottom: 1.2rem; }
        .alert-success { background: rgba(61,220,132,.1); color: var(--accent); border: 1px solid rgba(61,220,132,.25); }
        .alert-danger { background: rgba(239,91,91,.1); color: #ef5b5b; border: 1px solid rgba(239,91,91,.25); }
        #telegram-login-wrap { display: flex; justify-content: center; margin-bottom: 1.5rem; min-height: 40px; }
        .divider { display: flex; align-items: center; gap: .9rem; color: var(--muted); font-size: .78rem; margin: 1.3rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        label { display: block; font-size: .82rem; font-weight: 500; color: #a3adc2; margin-bottom: .4rem; }
        input[type=email] {
            width: 100%; background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
            border-radius: 10px; padding: .7rem .9rem; font-size: .92rem; margin-bottom: 1rem; font-family: inherit;
        }
        input[type=email]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,220,132,.15); }
        input[type=email]::placeholder { color: var(--muted); }
        button {
            width: 100%; background: var(--accent); color: #06140c; border: none; border-radius: 10px;
            padding: .75rem; font-size: .92rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .12s;
        }
        button:hover { background: #34c878; }
        .hint { text-align: center; color: var(--muted); font-size: .76rem; margin-top: .7rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><img src="/static/img/logo.jpg" alt="Unlock VPN"></div>
    <h1>Unlock VPN</h1>
    <p class="subtitle">Войдите чтобы управлять подпиской</p>

    {% if message %}<div class="alert alert-success">{{ message }}</div>{% endif %}
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}

    {% if bot_username %}
    <div id="telegram-login-wrap"></div>
    <div class="divider">или</div>
    <script>
        (function() {
            var s = document.createElement('script');
            s.src = 'https://telegram.org/js/telegram-widget.js?22';
            s.setAttribute('data-telegram-login', '{{ bot_username }}');
            s.setAttribute('data-size', 'large');
            s.setAttribute('data-radius', '10');
            s.setAttribute('data-auth-url', '{{ webapp_url }}/auth/telegram');
            s.setAttribute('data-userpic', 'true');
            s.async = true;
            document.getElementById('telegram-login-wrap').appendChild(s);
        })();
    </script>
    {% endif %}

    <form method="POST" action="/auth/login/email">
        <label>Email адрес</label>
        <input type="email" name="email" placeholder="your@email.com" required>
        <button type="submit">Получить ссылку для входа</button>
        <p class="hint">Мы пришлём письмо с кнопкой входа — без пароля</p>
    </form>
</div>
</body>
</html>
