<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — VPN Кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: white; border-radius: 20px; padding: 2.5rem;
            width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,.3);
        }
        .logo { font-size: 2.5rem; text-align: center; margin-bottom: .5rem; }
        .divider { display: flex; align-items: center; gap: 1rem; color: #94a3b8; margin: 1.5rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
        .btn-primary { background: #2563eb; border-color: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
        .tg-btn {
            background: #0088cc; color: white; border: none; border-radius: 8px;
            padding: .65rem 1.25rem; width: 100%; font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: .5rem;
            transition: background .15s;
        }
        .tg-btn:hover { background: #0077b3; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">🔒</div>
    <h4 class="text-center fw-bold mb-1">VPN Кабинет</h4>
    <p class="text-center text-muted mb-4">Войдите чтобы управлять подпиской</p>

    {% if message %}
    <div class="alert alert-success">{{ message }}</div>
    {% endif %}
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <!-- Telegram Login -->
    <div class="text-center mb-3">
        <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-login="{{ bot_username or 'your_bot' }}"
            data-size="large"
            data-auth-url="/auth/telegram"
            data-request-access="write">
        </script>
    </div>

    <div class="divider">или</div>

    <!-- Email Login -->
    <form method="POST" action="/auth/login/email">
        <div class="mb-3">
            <label class="form-label fw-semibold">Email адрес</label>
            <input type="email" name="email" class="form-control form-control-lg"
                placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">
            📧 Получить ссылку для входа
        </button>
        <small class="text-muted d-block text-center mt-2">
            Мы пришлём письмо с кнопкой входа — без пароля
        </small>
    </form>
</div>
</body>
</html>
