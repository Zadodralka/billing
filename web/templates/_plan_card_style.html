{# Общие стили карточек тарифов - используются на /dashboard/plans и /gift #}
<style>
    .plans-grid {
        display: grid; grid-template-columns: repeat(4, 1fr);
        gap: 1.1rem; margin-bottom: 2rem; align-items: stretch;
    }
    @media (max-width: 900px) { .plans-grid { grid-template-columns: repeat(2, 1fr); } }
    /* Раньше сетка держала 2 колонки до 480px - на этом диапазоне карточки становились
       слишком узкими и тесными, поэтому схлопываем в одну колонку чуть раньше */
    @media (max-width: 640px) { .plans-grid { grid-template-columns: 1fr; } }

    .plan-card {
        background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
        display: flex; flex-direction: column; overflow: hidden; position: relative;
        transition: border-color .15s, transform .15s, box-shadow .15s; height: 100%;
    }
    .plan-card:hover { transform: translateY(-3px); border-color: #2c3445; }
    .plan-card.featured {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent), 0 12px 32px rgba(61,220,132,.15);
    }
    .plan-card.featured:hover { box-shadow: 0 0 0 1px var(--accent), 0 16px 40px rgba(61,220,132,.22); }
    .plan-ribbon {
        background: var(--accent); color: #06140c; text-align: center; padding: .45rem;
        font-size: .68rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
        display: flex; align-items: center; justify-content: center; gap: .35rem;
    }
    .plan-body { padding: 1.6rem 1.3rem; display: flex; flex-direction: column; align-items: center; text-align: center; flex: 1; gap: .35rem; }
    .plan-name { color: #9aa5ba; font-weight: 600; font-size: .88rem; }
    .plan-price { font-family: 'Space Grotesk', sans-serif; font-size: 2.1rem; font-weight: 700; color: #fff; line-height: 1.1; margin: .3rem 0 .1rem; }
    .plan-price span { font-size: 1.05rem; color: var(--muted); font-weight: 500; margin-left: .15rem; }
    .plan-permonth { color: var(--muted); font-size: .76rem; margin-top: -.15rem; }
    .plan-duration { color: var(--muted); font-size: .78rem; margin-bottom: .3rem; }
    .plan-savings {
        display: inline-flex; align-items: center; gap: .3rem; background: var(--accent-soft); color: var(--accent);
        font-size: .72rem; font-weight: 700; padding: .25rem .6rem; border-radius: 999px; margin-bottom: .7rem;
    }
    .plan-traffic-static {
        color: var(--muted); font-size: .8rem; margin-bottom: 1.1rem; display: flex; align-items: center; gap: .4rem;
    }

    .traffic-toggle {
        display: flex; background: var(--panel-2); border: 1px solid var(--border);
        border-radius: 9px; padding: 3px; margin-bottom: 1.1rem; width: 100%;
    }
    .traffic-toggle button {
        flex: 1; background: transparent; border: none; color: var(--muted);
        font-size: .78rem; font-weight: 600; padding: .55rem .3rem; min-height: 40px;
        border-radius: 7px; cursor: pointer; transition: all .12s; font-family: inherit;
    }
    .traffic-toggle button.active { background: var(--accent); color: #06140c; }

    .plan-buy-btn { width: 100%; margin-top: auto; min-height: 44px; }

    .pay-cta {
        display: block; text-align: center; padding: .85rem; border-radius: var(--radius-sm);
        background: var(--accent); color: #06140c; font-weight: 700; font-size: .95rem;
        margin-bottom: .9rem; transition: background .12s;
    }
    .pay-cta:hover { background: #34c878; color: #06140c; }
    .pay-summary { text-align: center; margin-bottom: 1.3rem; }
    .pay-summary .pname { color: #fff; font-weight: 600; font-size: .95rem; }
    .pay-summary .pamount { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--accent); margin-top: .25rem; }
    .pay-hint { text-align: center; color: var(--muted); font-size: .78rem; margin: 0; }
    .pay-loading { display: flex; flex-direction: column; align-items: center; gap: .8rem; padding: 1rem 0; }
    .spinner { width: 32px; height: 32px; border-radius: 50%; border: 3px solid var(--panel-3); border-top-color: var(--accent); animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
