{% extends "base.html" %}
{% block title %}Админ — Дашборд{% endblock %}

{% block content %}
<h4 class="fw-bold mb-4">⚙️ Административная панель</h4>

<div class="row g-3 mb-4">
    <div class="col-sm-4">
        <div class="card">
            <div class="card-body d-flex align-items-center gap-3">
                <div style="font-size:2.5rem;">👥</div>
                <div>
                    <div class="display-6 fw-bold text-primary">{{ total_users }}</div>
                    <div class="text-muted">Пользователей</div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-4">
        <div class="card">
            <div class="card-body d-flex align-items-center gap-3">
                <div style="font-size:2.5rem;">✅</div>
                <div>
                    <div class="display-6 fw-bold text-success">{{ active_subs }}</div>
                    <div class="text-muted">Активных подписок</div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-4">
        <div class="card">
            <div class="card-body d-flex align-items-center gap-3">
                <div style="font-size:2.5rem;">💰</div>
                <div>
                    <div class="display-6 fw-bold text-warning">{{ total_revenue }}</div>
                    <div class="text-muted">Выручка, ₽</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row g-3">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h6 class="fw-bold mb-3">Быстрые ссылки</h6>
                <div class="list-group list-group-flush">
                    <a href="/admin/users" class="list-group-item list-group-item-action">
                        <i class="bi bi-people me-2"></i> Управление пользователями
                    </a>
                    <a href="/admin/subscriptions" class="list-group-item list-group-item-action">
                        <i class="bi bi-list-check me-2"></i> Все подписки
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
